<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarefas</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <div class="container">
    <header>
      <div class="header-label">MY WORKSPACE</div>
      <h1>Minhas<br><span>Tarefas</span></h1>
      <div class="task-count" id="taskCount">0 pendentes</div>
    </header>

    <div class="input-card">
      <div class="input-area">
        <input type="text" id="taskInput" placeholder="O que precisa ser feito?" autocomplete="off"/>
      </div>
      <div class="input-meta">
        <select id="categorySelect">
          <option value="pessoal">🙂 Pessoal</option>
          <option value="trabalho">💼 Trabalho</option>
          <option value="estudos">📚 Estudos</option>
          <option value="saude">❤️ Saúde</option>
          <option value="outro">📌 Outro</option>
        </select>
        <input type="date" id="dueDateInput"/>
        <button class="add-btn" onclick="addTask()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Adicionar
        </button>
      </div>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">Todas</button>
      <button class="filter-btn" onclick="setFilter('pending', this)">Pendentes</button>
      <button class="filter-btn" onclick="setFilter('done', this)">Concluídas</button>
      <button class="filter-btn" onclick="setFilter('pessoal', this)">🙂 Pessoal</button>
      <button class="filter-btn" onclick="setFilter('trabalho', this)">💼 Trabalho</button>
      <button class="filter-btn" onclick="setFilter('estudos', this)">📚 Estudos</button>
      <button class="filter-btn" onclick="setFilter('saude', this)">❤️ Saúde</button>
      <button class="filter-btn" onclick="setFilter('outro', this)">📌 Outro</button>
    </div>

    <ul id="taskList"></ul>
    <div class="empty" id="emptyMsg" style="display:none">
      <div class="empty-icon">✦</div>
      <p>Nenhuma tarefa aqui!</p>
    </div>
  </div>

  <script>
    let allTasks = [];
    let currentFilter = 'all';

    const categoryColors = {
      pessoal: '#7c6af7',
      trabalho: '#f7a26a',
      estudos: '#6af7c8',
      saude: '#f76a8a',
      outro: '#c8f04d'
    };

    const categoryLabels = {
      pessoal: '🙂 Pessoal',
      trabalho: '💼 Trabalho',
      estudos: '📚 Estudos',
      saude: '❤️ Saúde',
      outro: '📌 Outro'
    };

    async function loadTasks() {
      const res = await fetch("/tasks");
      allTasks = await res.json();
      renderTasks();
    }

    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTasks();
    }

    function formatDate(dateStr) {
      if (!dateStr) return null;
      const [y, m, d] = dateStr.split('-');
      return `${d}/${m}/${y}`;
    }

    function isOverdue(dateStr) {
      if (!dateStr) return false;
      return new Date(dateStr + 'T23:59:59') < new Date();
    }

    function renderTasks() {
      const list = document.getElementById("taskList");
      const empty = document.getElementById("emptyMsg");
      const count = document.getElementById("taskCount");

      let filtered = allTasks;
      if (currentFilter === 'pending') filtered = allTasks.filter(t => !t.done);
      else if (currentFilter === 'done') filtered = allTasks.filter(t => t.done);
      else if (['pessoal','trabalho','estudos','saude','outro'].includes(currentFilter))
        filtered = allTasks.filter(t => t.category === currentFilter);

      const pending = allTasks.filter(t => !t.done).length;
      count.textContent = `${pending} pendente${pending !== 1 ? 's' : ''}`;

      list.innerHTML = "";
      if (filtered.length === 0) { empty.style.display = "flex"; return; }
      empty.style.display = "none";

      filtered.forEach((task, i) => {
        const li = document.createElement("li");
        li.className = task.done ? "done" : "";
        li.style.animationDelay = `${i * 0.05}s`;
        const color = categoryColors[task.category] || '#c8f04d';
        const overdue = !task.done && isOverdue(task.due_date);

        li.innerHTML = `
          <button class="check-btn ${task.done ? 'checked' : ''}" onclick="toggleTask(${task.id})">
            ${task.done ? '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
          </button>
          <div class="task-body">
            <span class="task-title" ondblclick="startEdit(this, ${task.id})">${task.title}</span>
            <div class="task-meta">
              <span class="tag" style="background:${color}22; color:${color}">${categoryLabels[task.category] || '📌 Outro'}</span>
              ${task.due_date ? `<span class="due ${overdue ? 'overdue' : ''}">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                ${overdue ? '⚠️ ' : ''}${formatDate(task.due_date)}
              </span>` : ''}
            </div>
          </div>
          <button class="del-btn" onclick="deleteTask(${task.id})">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        `;
        list.appendChild(li);
      });
    }

    function startEdit(span, id) {
      const original = span.textContent;
      span.contentEditable = "true";
      span.classList.add('editing');
      span.focus();

      const range = document.createRange();
      range.selectNodeContents(span);
      window.getSelection().removeAllRanges();
      window.getSelection().addRange(range);

      span.onblur = () => finishEdit(span, id, original);
      span.onkeydown = (e) => {
        if (e.key === 'Enter') { e.preventDefault(); span.blur(); }
        if (e.key === 'Escape') { span.textContent = original; span.blur(); }
      };
    }

    async function finishEdit(span, id, original) {
      span.contentEditable = "false";
      span.classList.remove('editing');
      const newTitle = span.textContent.trim();
      if (!newTitle || newTitle === original) { span.textContent = original; return; }
      await fetch(`/tasks/${id}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title: newTitle })
      });
      loadTasks();
    }

    async function addTask() {
      const input = document.getElementById("taskInput");
      const title = input.value.trim();
      if (!title) { input.classList.add('shake'); setTimeout(() => input.classList.remove('shake'), 400); return; }
      const category = document.getElementById("categorySelect").value;
      const due_date = document.getElementById("dueDateInput").value;
      await fetch("/tasks", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title, category, due_date })
      });
      input.value = "";
      document.getElementById("dueDateInput").value = "";
      loadTasks();
    }

    async function toggleTask(id) {
      await fetch(`/tasks/${id}`, { method: "PUT" });
      loadTasks();
    }

    async function deleteTask(id) {
      await fetch(`/tasks/${id}`, { method: "DELETE" });
      loadTasks();
    }

    document.getElementById("taskInput").addEventListener("keydown", e => {
      if (e.key === "Enter") addTask();
    });

    loadTasks();
  </script>
</body>
</html>
